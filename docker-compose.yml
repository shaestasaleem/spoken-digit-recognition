version: '3.8'

services:
  phonemeiq:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_SERVER_RUNONSAVE=true
      - STREAMLIT_SERVER_MAXUPLOADSIZE=100
      - STREAMLIT_LOGGER_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
